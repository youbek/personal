name: Build static files
on:
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Build next app and export static files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch changes
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Build next app
        run: npm run build
      - name: Create static files
        run: npm run export
